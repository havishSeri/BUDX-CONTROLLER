<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>budx-controller</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        overflow: hidden;
        background: #0a0a0a;
        font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
      }

      #arm-container { width: 100vw; height: 100vh; position: relative; }

      #arm-canvas {
        display: block; width: 100%; height: 100%;
        cursor: grab;
      }
      #arm-canvas:active { cursor: grabbing; }

      /* ── Panel ── */
      #arm-ui {
        position: absolute; top: 20px; left: 20px;
        background: rgba(8, 8, 8, 0.90);
        backdrop-filter: blur(14px);
        border: 1px solid rgba(255,102,0,0.22);
        border-radius: 10px;
        padding: 16px 18px;
        min-width: 220px;
        color: #e8ddd0;
        z-index: 10;
        box-shadow: 0 0 0 1px rgba(0,0,0,0.7), 0 8px 32px rgba(0,0,0,0.7), 0 0 40px rgba(255,102,0,0.04);
      }

      .ui-title {
        font-size: 10px; font-weight: 700;
        color: #ff6600; letter-spacing: 0.18em;
        text-transform: uppercase;
        margin-bottom: 14px;
        display: flex; align-items: center; gap: 8px;
      }
      .ui-title::before {
        content: ''; width: 6px; height: 6px;
        background: #ff6600; border-radius: 50%;
        box-shadow: 0 0 8px #ff6600;
        animation: pulse 2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,100% { opacity:1; box-shadow: 0 0 8px #ff6600; }
        50%      { opacity:.25; box-shadow: 0 0 2px #ff6600; }
      }

      /* ── Joint rows ── */
      .joint-row {
        display: flex; justify-content: space-between; align-items: center;
        padding: 5px 0;
        border-bottom: 1px solid rgba(255,102,0,0.07);
        font-size: 10px;
      }
      .joint-row:last-child { border-bottom: none; }
      .joint-name { color: #6a5a4a; letter-spacing: 0.08em; }
      .joint-val  { color: #ff8833; font-variant-numeric: tabular-nums; min-width: 52px; text-align: right; }

      /* ── Active joint label ── */
      #joint-label {
        position: absolute; top: 20px; right: 20px;
        background: rgba(8,8,8,0.88);
        border: 1px solid rgba(255,102,0,0.4);
        border-radius: 8px;
        padding: 8px 14px;
        font-size: 11px; font-weight: 700;
        color: #ff6600;
        letter-spacing: 0.14em;
        opacity: 0;
        transition: opacity 0.15s ease;
        pointer-events: none;
        font-family: 'JetBrains Mono', monospace;
        box-shadow: 0 0 20px rgba(255,102,0,0.15);
      }

      /* ── Hints ── */
      .hints {
        margin-top: 12px; padding-top: 10px;
        border-top: 1px solid rgba(255,102,0,0.1);
      }
      .hint-row {
        display: flex; align-items: center; gap: 8px;
        margin-bottom: 5px; font-size: 10px; color: #5a4a3a;
      }
      .hint-key {
        background: rgba(255,102,0,0.08);
        border: 1px solid rgba(255,102,0,0.2);
        border-radius: 4px; padding: 1px 6px;
        font-size: 9px; color: #ff6600;
        letter-spacing: 0.06em;
      }

      #corner-badge {
        position: absolute; bottom: 20px; right: 20px;
        font-size: 9px; letter-spacing: 0.22em;
        color: rgba(255,102,0,0.18);
        text-transform: uppercase; user-select: none;
      }
    </style>
  </head>
  <body>
    <div id="arm-container">
      <canvas id="arm-canvas"></canvas>

      <div id="arm-ui">
        <div class="ui-title">Joint Control</div>

        <div class="joint-row">
          <span class="joint-name">TURNTABLE</span>
          <span class="joint-val" id="jv-Turntable">0.0°</span>
        </div>
        <div class="joint-row">
          <span class="joint-name">UPPER ARM</span>
          <span class="joint-val" id="jv-Upper-Arm">0.0°</span>
        </div>
        <div class="joint-row">
          <span class="joint-name">FORE ARM</span>
          <span class="joint-val" id="jv-Fore-Arm">0.0°</span>
        </div>
        <div class="joint-row">
          <span class="joint-name">WRIST</span>
          <span class="joint-val" id="jv-Wrist">0.0°</span>
        </div>

        <div class="hints">
          <div class="hint-row"><span class="hint-key">drag part</span><span>pose joint</span></div>
          <div class="hint-row"><span class="hint-key">drag bg</span><span>orbit camera</span></div>
          <div class="hint-row"><span class="hint-key">scroll</span><span>zoom</span></div>
        </div>
      </div>

      <div id="joint-label"></div>
      <div id="corner-badge">budx · v0.2</div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
